<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BE · DO · HAVE — Identity Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --teal: #1aae81;
    --teal10: rgba(26,174,129,0.08);
    --teal20: rgba(26,174,129,0.16);
    --teal40: rgba(26,174,129,0.32);
    --black: #191819;
    --white: #f4f9ff;
    --tang: #f68d2e;
    --tang10: rgba(246,141,46,0.08);
    --tang20: rgba(246,141,46,0.18);
    --muted: rgba(25,24,25,0.44);
    --border: rgba(25,24,25,0.09);
    --border2: rgba(25,24,25,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  .shell { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── HEADER ── */
  .site-header {
    padding: 32px 0 28px;
    border-bottom: 0.5px solid var(--border2);
    margin-bottom: 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }
  .site-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.1;
    color: var(--black);
  }
  .site-header h1 em { font-style: italic; color: var(--teal); }
  .site-header p { font-size: 14px; color: var(--muted); margin-top: 5px; font-weight: 300; }
  .last-updated { font-size: 11px; color: var(--muted); text-align: right; }
  .dot-live { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--teal); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── NAV ── */
  .phase-nav {
    display: flex;
    gap: 0;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 36px;
    background: rgba(25,24,25,0.03);
  }
  .pnav-btn {
    flex: 1;
    padding: 12px 8px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    border-right: 0.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .pnav-btn:last-child { border-right: none; }
  .pnav-btn.active-be { background: var(--teal); color: var(--white); }
  .pnav-btn.active-do { background: var(--tang); color: var(--white); }
  .pnav-btn.active-have { background: var(--black); color: var(--white); }
  .pnav-btn.active-week { background: var(--black); color: var(--white); }
  .pnav-btn.active-map { background: var(--black); color: var(--white); }
  .pnav-count {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 20px;
    background: rgba(255,255,255,0.25);
    color: inherit;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.visible { display: block; }

  /* ── PHASE INTRO ── */
  .phase-intro { margin-bottom: 28px; }
  .phase-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .phase-intro h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--black);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .phase-intro h2 em { font-style: italic; color: var(--teal); }
  .phase-intro p { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 580px; }

  /* ── CARDS ── */
  .card-list { display: flex; flex-direction: column; gap: 10px; }

  .be-card {
    background: var(--white);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s;
  }
  .be-card.strong { border-color: var(--teal); background: var(--teal10); }
  .be-icon {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--teal20); color: var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .be-body { flex: 1; }
  .be-statement { font-size: 15px; font-weight: 500; color: var(--black); line-height: 1.35; margin-bottom: 4px; }
  .be-statement span { color: var(--muted); font-weight: 400; }
  .be-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .domain-pill {
    font-size: 11px; padding: 2px 9px; border-radius: 20px;
    background: var(--teal10); color: var(--teal); font-weight: 500;
  }
  .conv-dots { display: flex; gap: 3px; }
  .conv-dot { width: 7px; height: 7px; border-radius: 50%; }
  .conv-dot.on { background: var(--teal); }
  .conv-dot.off { background: var(--border2); }
  .meta-date { font-size: 11px; color: var(--muted); }

  .do-card {
    background: var(--white);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: flex-start;
    position: relative;
  }
  .do-card::before {
    content: '';
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px; background: var(--tang);
    border-radius: 0 2px 2px 0;
  }
  .do-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--tang10); color: var(--tang);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .do-body {}
  .do-action { font-size: 14px; font-weight: 500; color: var(--black); margin-bottom: 4px; line-height: 1.35; }
  .do-id-ref {
    display: inline-block; font-size: 11px; padding: 2px 9px;
    border-radius: 20px; background: var(--teal10); color: var(--teal);
    font-weight: 500; margin-bottom: 6px;
  }
  .do-note { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 4px; }
  .do-meta { font-size: 11px; color: var(--muted); }

  .have-card {
    background: var(--white);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px 20px;
    position: relative;
  }
  .have-card::before {
    content: '';
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 3px; background: var(--black);
    border-radius: 0 2px 2px 0;
  }
  .have-title { font-size: 15px; font-weight: 500; color: var(--black); margin-bottom: 4px; line-height: 1.35; }
  .have-desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
  .have-proof {
    background: var(--teal10); border-left: 2px solid var(--teal);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 9px 12px;
    font-size: 13px; color: var(--black); line-height: 1.45;
  }
  .have-proof-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--teal); margin-bottom: 3px; }
  .have-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ── WEEKLY INSIGHTS ── */
  .week-group { margin-bottom: 36px; }
  .week-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid var(--border2);
  }
  .week-label {
    font-size: 12px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--muted);
  }
  .week-count-pill {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: var(--black); color: var(--white);
  }

  .insight-card {
    background: var(--white);
    border: 0.5px solid var(--teal40);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-top: 14px;
    position: relative;
    overflow: hidden;
  }
  .insight-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--teal);
  }
  .insight-eyebrow {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--teal); margin-bottom: 8px;
  }
  .insight-text {
    font-family: 'DM Serif Display', serif;
    font-size: 18px; font-weight: 400; font-style: italic;
    line-height: 1.45; color: var(--black);
    margin-bottom: 12px;
  }
  .insight-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .insight-action-tag {
    font-size: 12px; padding: 3px 10px; border-radius: 20px;
    background: var(--tang10); color: var(--tang); font-weight: 500;
  }

  .week-entries { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .week-entry {
    background: var(--white);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .entry-type-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }
  .entry-type-dot.be { background: var(--teal); }
  .entry-type-dot.do { background: var(--tang); }
  .entry-type-dot.have { background: var(--black); }
  .entry-body { flex: 1; }
  .entry-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 2px; }
  .entry-text { font-size: 13px; color: var(--black); line-height: 1.4; }
  .entry-id-link { font-size: 11px; color: var(--teal); margin-top: 3px; }

  /* ── CAPABILITY MAP ── */
  .map-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 32px; }
  .map-col {
    background: var(--white);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    min-height: 120px;
  }
  .map-col.be { border-top: 3px solid var(--teal); }
  .map-col.do { border-top: 3px solid var(--tang); }
  .map-col.have { border-top: 3px solid var(--black); }
  .map-col-label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 10px;
  }
  .map-col.be .map-col-label { color: var(--teal); }
  .map-col.do .map-col-label { color: var(--tang); }
  .map-col.have .map-col-label { color: var(--black); }
  .map-item {
    font-size: 12px; color: var(--black);
    padding: 5px 0; border-bottom: 0.5px solid var(--border);
    line-height: 1.4;
  }
  .map-item:last-child { border-bottom: none; }
  .map-empty { font-size: 12px; color: var(--muted); font-style: italic; }

  .portrait-card {
    background: var(--teal10);
    border: 0.5px solid var(--teal40);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 24px;
  }
  .portrait-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--teal); margin-bottom: 10px; }
  .portrait-text {
    font-family: 'DM Serif Display', serif;
    font-size: 18px; font-style: italic; line-height: 1.55;
    color: var(--black);
  }

  .territory-section { margin-bottom: 24px; }
  .territory-row { margin-bottom: 14px; }
  .territory-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .territory-name { font-size: 12px; color: var(--muted); }
  .territory-val { font-size: 12px; font-weight: 500; color: var(--black); }
  .territory-track { height: 5px; background: var(--border2); border-radius: 4px; overflow: hidden; }
  .territory-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .territory-fill.teal { background: var(--teal); }
  .territory-fill.tang { background: var(--tang); }
  .territory-fill.dark { background: var(--black); }

  /* ── LOADING / ERROR ── */
  .loading-state, .error-state, .config-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .loading-state .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 14px; }
  .error-state p, .config-state p { font-size: 14px; line-height: 1.6; max-width: 440px; margin: 0 auto; }
  .error-state h3, .config-state h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--black); }
  .config-box {
    background: var(--white); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 20px 24px;
    max-width: 480px; margin: 20px auto 0; text-align: left;
  }
  .config-box code {
    display: block;
    background: rgba(25,24,25,0.05);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 12px;
    font-family: monospace;
    margin: 8px 0;
    line-height: 1.6;
    word-break: break-all;
    color: var(--black);
  }

  /* ── FOOTER ── */
  .site-footer {
    border-top: 0.5px solid var(--border2);
    padding: 20px 0;
    margin-top: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }
  .footer-brand { font-weight: 500; color: var(--teal); }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .map-cols { grid-template-columns: 1fr; }
    .site-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .pnav-btn { font-size: 11px; padding: 10px 4px; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- HEADER -->
  <header class="site-header">
    <div>
      <h1>BE · DO · <em>HAVE</em></h1>
      <p>Your identity map. The proof is accumulating.</p>
    </div>
    <div class="last-updated">
      <span class="dot-live"></span>
      <span id="last-updated-text">Loading…</span>
    </div>
  </header>

  <!-- NAV -->
  <nav class="phase-nav" aria-label="Dashboard sections">
    <button class="pnav-btn active-be" id="nb-be" onclick="showView('be')">
      &#9679; BE <span class="pnav-count" id="cnt-be">0</span>
    </button>
    <button class="pnav-btn" id="nb-do" onclick="showView('do')">
      &#9651; DO <span class="pnav-count" id="cnt-do">0</span>
    </button>
    <button class="pnav-btn" id="nb-have" onclick="showView('have')">
      &#9670; HAVE <span class="pnav-count" id="cnt-have">0</span>
    </button>
    <button class="pnav-btn" id="nb-week" onclick="showView('week')">
      &#9632; Weekly
    </button>
    <button class="pnav-btn" id="nb-map" onclick="showView('map')">
      &#9651; Map
    </button>
  </nav>

  <!-- MAIN CONTENT AREA -->
  <main id="main-content">
    <div class="loading-state" id="loading-state">
      <div class="spinner"></div>
      <p>Loading your identity map…</p>
    </div>
  </main>

</div>

<!-- TEMPLATES (hidden, cloned by JS) -->
<template id="tpl-be-view">
  <div class="view" id="view-be">
    <div class="phase-intro">
      <div class="phase-tag">Step 1 · Identity</div>
      <h2>Who are you <em>already?</em></h2>
      <p>These are your declared identities — not goals, but present truths. Each one is a lens that shapes every action you take.</p>
    </div>
    <div class="card-list" id="be-list"></div>
  </div>
</template>

<template id="tpl-do-view">
  <div class="view" id="view-do">
    <div class="phase-intro">
      <div class="phase-tag">Step 2 · Action</div>
      <h2>What are you doing <em>as that person?</em></h2>
      <p>Every action here is evidence — logged as the person you declared yourself to be, linked back to the identity that drove it.</p>
    </div>
    <div class="card-list" id="do-list"></div>
  </div>
</template>

<template id="tpl-have-view">
  <div class="view" id="view-have">
    <div class="phase-intro">
      <div class="phase-tag">Step 3 · Result</div>
      <h2>What is <em>manifesting?</em></h2>
      <p>Results traced back to identity and action — so your brain sees the full causal chain: BE → DO → HAVE.</p>
    </div>
    <div class="card-list" id="have-list"></div>
  </div>
</template>

<template id="tpl-week-view">
  <div class="view" id="view-week">
    <div class="phase-intro">
      <div class="phase-tag">Weekly insights</div>
      <h2>What your weeks <em>reveal about you</em></h2>
      <p>Looking back is not living in the past — it's building a proof trail. Each week of action validates who you are becoming.</p>
    </div>
    <div id="week-groups"></div>
  </div>
</template>

<template id="tpl-map-view">
  <div class="view" id="view-map">
    <div class="phase-intro">
      <div class="phase-tag">Capability map</div>
      <h2>What you are <em>capable of</em></h2>
      <p>The full picture — your identity, actions, and results as a single growing territory of proof.</p>
    </div>
    <div class="portrait-card" id="portrait-card">
      <div class="portrait-label">Your capability portrait</div>
      <div class="portrait-text" id="portrait-text">Loading your portrait…</div>
    </div>
    <div class="map-cols">
      <div class="map-col be"><div class="map-col-label">I AM</div><div id="map-be-list"></div></div>
      <div class="map-col do"><div class="map-col-label">I DO</div><div id="map-do-list"></div></div>
      <div class="map-col have"><div class="map-col-label">I HAVE</div><div id="map-have-list"></div></div>
    </div>
    <div class="territory-section">
      <div class="territory-row">
        <div class="territory-label-row"><span class="territory-name">Identities declared</span><span class="territory-val" id="tv-be">0</span></div>
        <div class="territory-track"><div class="territory-fill teal" id="tf-be" style="width:0%"></div></div>
      </div>
      <div class="territory-row">
        <div class="territory-label-row"><span class="territory-name">Actions taken</span><span class="territory-val" id="tv-do">0</span></div>
        <div class="territory-track"><div class="territory-fill tang" id="tf-do" style="width:0%"></div></div>
      </div>
      <div class="territory-row">
        <div class="territory-label-row"><span class="territory-name">Results acknowledged</span><span class="territory-val" id="tv-have">0</span></div>
        <div class="territory-track"><div class="territory-fill dark" id="tf-have" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</template>

<script>
  // ─────────────────────────────────────────────
  // CONFIG — edit SHEET_ID in config.js or here
  // ─────────────────────────────────────────────
  const CONFIG = {
    // Paste your Google Sheet ID here (from the URL)
    // e.g. https://docs.google.com/spreadsheets/d/THIS_PART_HERE/edit
    SHEET_ID: window.SHEET_ID || '2PACX-1vSFXFmJ1U62FT8FPapNMftvY6LfwEuVotW2FnJbHOi5b6ThRP7NMxXs5hyZWhG_y9rjDzgd3Q3shn8M',
    // Tabs (exact names from your sheet)
    TABS: { BE: 'BE', DO: 'DO', HAVE: 'HAVE' },
  };

  // ─────────────────────────────────────────────
  // DATA LAYER — Google Sheets CSV fetch
  // ─────────────────────────────────────────────
  async function fetchSheet(tabName) {
    const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Could not fetch sheet "${tabName}"`);
    const text = await res.text();
    return parseCSV(text);
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    const headers = parseCSVRow(lines[0]).map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
    return lines.slice(1).map(line => {
      const vals = parseCSVRow(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
      return obj;
    }).filter(row => Object.values(row).some(v => v));
  }

  function parseCSVRow(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else cur += c;
    }
    result.push(cur);
    return result;
  }

  // ─────────────────────────────────────────────
  // UTILS
  // ─────────────────────────────────────────────
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : s; }

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s;
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Yesterday';
    if (diff < 7) return diff + 'd ago';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: diff > 300 ? 'numeric' : undefined });
  }

  function getWeekLabel(dateStr) {
    if (!dateStr) return 'Unknown week';
    const d = new Date(dateStr);
    if (isNaN(d)) return 'Unknown week';
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const sun = new Date(mon);
    sun.setDate(mon.getDate() + 6);
    const fmt = dt => dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    return `${fmt(mon)} – ${fmt(sun)}`;
  }

  function getWeekKey(dateStr) {
    if (!dateStr) return 'zzz';
    const d = new Date(dateStr);
    if (isNaN(d)) return 'zzz';
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    return mon.toISOString().slice(0, 10);
  }

  function convDots(n, max = 5) {
    let html = '<div class="conv-dots">';
    for (let i = 1; i <= max; i++) {
      html += `<div class="conv-dot ${i <= n ? 'on' : 'off'}"></div>`;
    }
    return html + '</div>';
  }

  // ─────────────────────────────────────────────
  // RENDER — BE
  // ─────────────────────────────────────────────
  function renderBe(data) {
    const list = document.getElementById('be-list');
    if (!list) return;
    if (!data.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:40px 0">No identities yet — add them to your BE sheet tab.</p>';
      return;
    }
    list.innerHTML = data.map(row => {
      const conv = parseInt(row.conviction) || 1;
      const strong = conv >= 4;
      return `
        <div class="be-card ${strong ? 'strong' : ''}">
          <div class="be-icon">&#9679;</div>
          <div class="be-body">
            <div class="be-statement"><span>I am someone who </span>${esc(row.statement)}</div>
            <div class="be-meta">
              ${row.domain ? `<span class="domain-pill">${esc(row.domain)}</span>` : ''}
              ${convDots(conv)}
              <span class="meta-date">${formatDate(row.date)}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ─────────────────────────────────────────────
  // RENDER — DO
  // ─────────────────────────────────────────────
  function renderDo(data) {
    const list = document.getElementById('do-list');
    if (!list) return;
    if (!data.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:40px 0">No actions logged yet — add them to your DO sheet tab.</p>';
      return;
    }
    list.innerHTML = data.map(row => `
      <div class="do-card">
        <div class="do-icon">&#9651;</div>
        <div class="do-body">
          ${row.identity_link ? `<div class="do-id-ref">&#9679; ${esc(truncate(row.identity_link, 48))}</div>` : ''}
          <div class="do-action">${esc(row.action)}</div>
          ${row.note ? `<div class="do-note">${esc(row.note)}</div>` : ''}
          <div class="do-meta">${formatDate(row.date)}</div>
        </div>
      </div>`).join('');
  }

  // ─────────────────────────────────────────────
  // RENDER — HAVE
  // ─────────────────────────────────────────────
  function renderHave(data) {
    const list = document.getElementById('have-list');
    if (!list) return;
    if (!data.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:40px 0">No results yet — they are forming. Log them in the HAVE tab when they arrive.</p>';
      return;
    }
    list.innerHTML = data.map(row => `
      <div class="have-card">
        <div class="have-title">${esc(row.result)}</div>
        ${row.description ? `<div class="have-desc">${esc(row.description)}</div>` : ''}
        ${row.identity_link ? `
          <div class="have-proof">
            <div class="have-proof-label">Came from being</div>
            I am someone who ${esc(truncate(row.identity_link, 60))}
          </div>` : ''}
        <div class="have-meta">${formatDate(row.date)}</div>
      </div>`).join('');
  }

  // ─────────────────────────────────────────────
  // RENDER — WEEKLY INSIGHTS
  // ─────────────────────────────────────────────
  function generateInsight(weekEntries) {
    const actions = weekEntries.filter(e => e.type === 'do');
    const results = weekEntries.filter(e => e.type === 'have');
    const identities = [...new Set(weekEntries.map(e => e.identity_link).filter(Boolean))];

    if (!weekEntries.length) return null;

    const phrases = [];
    if (actions.length >= 3) phrases.push(`You took ${actions.length} concrete actions this week — this is not someone waiting for conditions. This is someone who moves.`);
    else if (actions.length > 0) phrases.push(`${actions.length} action${actions.length > 1 ? 's' : ''} taken — each one a vote for who you are.`);
    if (results.length > 0) phrases.push(`${results.length} result${results.length > 1 ? 's' : ''} acknowledged — the identity is producing outcomes.`);
    if (identities.length > 0) phrases.push(`Acting from: "${truncate(identities[0], 50)}".`);
    if (!phrases.length) phrases.push('Evidence logged. The map is growing.');

    return phrases.join(' ');
  }

  function renderWeekly(beData, doData, haveData) {
    const container = document.getElementById('week-groups');
    if (!container) return;

    const allEntries = [
      ...beData.map(r => ({ ...r, type: 'be', text: r.statement, identity_link: null })),
      ...doData.map(r => ({ ...r, type: 'do', text: r.action })),
      ...haveData.map(r => ({ ...r, type: 'have', text: r.result })),
    ].filter(e => e.date);

    // Group by week
    const weeks = {};
    allEntries.forEach(e => {
      const key = getWeekKey(e.date);
      if (!weeks[key]) weeks[key] = [];
      weeks[key].push(e);
    });

    const sortedKeys = Object.keys(weeks).sort((a, b) => b.localeCompare(a));

    if (!sortedKeys.length) {
      container.innerHTML = '<p style="color:var(--muted);font-size:14px;text-align:center;padding:40px 0">No weekly data yet. Start logging entries with dates.</p>';
      return;
    }

    container.innerHTML = sortedKeys.map(key => {
      const entries = weeks[key];
      const label = getWeekLabel(entries[0].date);
      const insight = generateInsight(entries);
      const doEntries = entries.filter(e => e.type === 'do');
      const haveEntries = entries.filter(e => e.type === 'have');

      return `
        <div class="week-group">
          <div class="week-header">
            <span class="week-label">${label}</span>
            <span class="week-count-pill">${entries.length} entries</span>
          </div>
          ${insight ? `
            <div class="insight-card">
              <div class="insight-eyebrow">&#9670; What this week reveals about you</div>
              <div class="insight-text">"${insight}"</div>
              ${doEntries.length ? `<div class="insight-actions">${doEntries.slice(0,3).map(e => `<span class="insight-action-tag">${esc(truncate(e.text,36))}</span>`).join('')}</div>` : ''}
            </div>` : ''}
          <div class="week-entries">
            ${entries.map(e => `
              <div class="week-entry">
                <div class="entry-type-dot ${e.type}"></div>
                <div class="entry-body">
                  <div class="entry-label">${e.type.toUpperCase()}</div>
                  <div class="entry-text">${esc(e.text)}</div>
                  ${e.identity_link ? `<div class="entry-id-link">&#9679; ${esc(truncate(e.identity_link, 50))}</div>` : ''}
                </div>
              </div>`).join('')}
          </div>
        </div>`;
    }).join('');
  }

  // ─────────────────────────────────────────────
  // RENDER — MAP
  // ─────────────────────────────────────────────
  function buildPortrait(beData, doData, haveData) {
    const parts = [];
    if (beData.length) {
      const domains = [...new Set(beData.map(r => r.domain).filter(Boolean))];
      if (domains.length) parts.push(`You operate across ${domains.slice(0, 3).join(', ')}.`);
    }
    if (doData.length >= 3) parts.push(`You have taken at least ${doData.length} documented actions as this person.`);
    if (haveData.length) parts.push(`You have acknowledged ${haveData.length} concrete result${haveData.length > 1 ? 's' : ''} that came from this identity.`);
    if (beData.length) parts.push(`The identity is declared. The evidence is accumulating. The HAVE is the natural consequence.`);
    return parts.join(' ') || 'Start filling your BE, DO, and HAVE tabs to build your portrait.';
  }

  function renderMap(beData, doData, haveData) {
    const beList = document.getElementById('map-be-list');
    const doList = document.getElementById('map-do-list');
    const haveList = document.getElementById('map-have-list');
    const portrait = document.getElementById('portrait-text');

    if (portrait) portrait.textContent = buildPortrait(beData, doData, haveData);

    const renderCol = (el, items, key) => {
      if (!el) return;
      el.innerHTML = items.length
        ? items.slice(0, 10).map(r => `<div class="map-item">${esc(truncate(r[key], 48))}</div>`).join('')
        : '<div class="map-empty">Nothing yet</div>';
    };

    renderCol(beList, beData, 'statement');
    renderCol(doList, doData, 'action');
    renderCol(haveList, haveData, 'result');

    const set = (id, val, max) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    };
    const setW = (id, val, max) => {
      const el = document.getElementById(id);
      if (el) el.style.width = Math.min(100, Math.round(val / max * 100)) + '%';
    };

    set('tv-be', beData.length);
    set('tv-do', doData.length);
    set('tv-have', haveData.length);
    setW('tf-be', beData.length, 10);
    setW('tf-do', doData.length, 20);
    setW('tf-have', haveData.length, 10);
  }

  // ─────────────────────────────────────────────
  // VIEW CONTROLLER
  // ─────────────────────────────────────────────
  let currentView = 'be';
  function showView(v) {
    currentView = v;
    ['be', 'do', 'have', 'week', 'map'].forEach(x => {
      const el = document.getElementById('view-' + x);
      if (el) el.className = 'view' + (x === v ? ' visible' : '');
      const nb = document.getElementById('nb-' + x);
      if (nb) nb.className = 'pnav-btn' + (x === v ? ' active-' + v : '');
    });
  }

  // ─────────────────────────────────────────────
  // BOOTSTRAP
  // ─────────────────────────────────────────────
  async function init() {
    const main = document.getElementById('main-content');

    if (CONFIG.SHEET_ID === 'YOUR_SHEET_ID_HERE') {
      main.innerHTML = `
        <div class="config-state">
          <h3>Almost there</h3>
          <p>Paste your Google Sheet ID into <code>config.js</code> (or directly into <code>index.html</code>) to connect your data.</p>
          <div class="config-box">
            <p style="font-size:13px;color:var(--muted);margin-bottom:8px">Your Sheet ID is the long string in the URL:</p>
            <code>docs.google.com/spreadsheets/d/<strong>← THIS PART →</strong>/edit</code>
            <p style="font-size:13px;color:var(--muted);margin-top:10px">Then replace <code>YOUR_SHEET_ID_HERE</code> in <code>index.html</code> line ~290.</p>
          </div>
        </div>`;
      return;
    }

    try {
      const [beData, doData, haveData] = await Promise.all([
        fetchSheet(CONFIG.TABS.BE),
        fetchSheet(CONFIG.TABS.DO),
        fetchSheet(CONFIG.TABS.HAVE),
      ]);

      // Update counters
      document.getElementById('cnt-be').textContent = beData.length;
      document.getElementById('cnt-do').textContent = doData.length;
      document.getElementById('cnt-have').textContent = haveData.length;
      document.getElementById('last-updated-text').textContent = 'Updated ' + formatDate(new Date().toISOString());

      // Build DOM from templates
      main.innerHTML = '';
      ['be', 'do', 'have', 'week', 'map'].forEach(id => {
        const tpl = document.getElementById('tpl-' + id + '-view');
        if (tpl) main.appendChild(tpl.content.cloneNode(true));
      });

      renderBe(beData);
      renderDo(doData);
      renderHave(haveData);
      renderWeekly(beData, doData, haveData);
      renderMap(beData, doData, haveData);

      showView('be');

    } catch (err) {
      main.innerHTML = `
        <div class="error-state">
          <h3>Could not load data</h3>
          <p>${esc(err.message)}<br><br>Make sure your Google Sheet is published to the web (<em>File → Share → Publish to web</em>) and the Sheet ID is correct.</p>
        </div>`;
    }
  }

  init();
</script>
</body>
</html>
